<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Trade Mirror — F&O session ledger</title>
<meta name="description" content="A free, searchable ledger of an Indian intraday F&O trader's daily sessions — setups, entry reasoning, win rates, and next-day plans, extracted from YouTube recaps.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@600;800;900&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: { extend: {
    colors: {
      ink:'#0A0E15', card:'#101622', well:'#0C111B', line:'rgba(154,170,196,0.13)',
      hi:'#E8EDF6', lo:'#8A96AB', amber:'#F0A63C', profit:'#33C98E', loss:'#F0565C', violet:'#8B7CF6',
    },
    fontFamily: {
      disp:['Archivo','sans-serif'], body:['"IBM Plex Sans"','sans-serif'], mono:['"IBM Plex Mono"','monospace'],
    },
  }},
};
</script>
<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone@7.26.0/babel.min.js"></script>
<style>
  html { color-scheme: dark; }
  .font-mono { font-variant-numeric: tabular-nums; }
  body { background: radial-gradient(1100px 480px at 50% -200px,rgba(240,166,60,0.07),transparent 62%), #0A0E15; }
  ::-webkit-scrollbar { width:9px; height:9px; }
  ::-webkit-scrollbar-thumb { background:rgba(154,170,196,0.18); border-radius:6px; }
  :focus-visible { outline:2px solid #F0A63C; outline-offset:2px; border-radius:4px; }
  .glow-amber { text-shadow:0 0 16px rgba(240,166,60,0.40); }
  @media (prefers-reduced-motion:reduce) { * { transition-duration:0.01ms !important; } }
</style>
</head>
<body class="bg-ink text-hi font-body min-h-screen antialiased">
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useMemo, useCallback } = React;

/* ----------------------------------------------------------------- helpers */
const fmtPts  = v => v == null ? '—' : (v > 0 ? `+${Math.round(v*100)/100}` : `${Math.round(v*100)/100}`);
const pnlClass = v => v == null ? 'text-lo' : v >= 0 ? 'text-profit' : 'text-loss';
const fmtDate = s => {
  if (!s) return '—';
  const d = new Date(s);
  return isNaN(d) ? s : d.toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'});
};
const resultTone = r =>
  r==='PROFIT' ? 'text-profit border-profit/40 bg-profit/10' :
  r==='LOSS'   ? 'text-loss border-loss/40 bg-loss/10' :
  r==='MIXED'  ? 'text-amber border-amber/40 bg-amber/10' : 'text-lo border-line bg-well';
const biasTone = b =>
  b==='bullish' ? 'text-profit border-profit/40 bg-profit/10' :
  b==='bearish' ? 'text-loss border-loss/40 bg-loss/10' :
  b==='range'   ? 'text-amber border-amber/40 bg-amber/10' : 'text-lo border-line bg-well';

/* ----------------------------------------------------------------- routing */
function useHash() {
  const [h,setH] = useState(window.location.hash||'#/');
  useEffect(()=>{
    const fn=()=>setH(window.location.hash||'#/');
    window.addEventListener('hashchange',fn);
    return ()=>window.removeEventListener('hashchange',fn);
  },[]);
  return h;
}
const go = p => { window.location.hash = p; };

/* ----------------------------------------------------------------- atoms */
function Chip({tone,children,title}){
  return <span title={title} className={`px-1.5 py-0.5 rounded border text-[10px] font-mono uppercase tracking-[0.12em] ${tone}`}>{children}</span>;
}
function ResultChip({r}){
  return <Chip tone={resultTone(r)}>{r==='PROFIT'?'profit':r==='LOSS'?'loss':r==='MIXED'?'mixed':'flat'}</Chip>;
}
function DirChip({d}){
  if(!d) return null;
  return <span className={`px-1.5 py-0.5 rounded text-[10px] font-mono font-semibold border ${d==='LONG'?'text-profit border-profit/40 bg-profit/10':'text-loss border-loss/40 bg-loss/10'}`}>{d}</span>;
}

/* ----------------------------------------------------------------- nav */
function Nav(){
  const hash = useHash();
  const tabs = [['#/','Overview'],['#/sessions','Sessions'],['#/setups','Setups'],['#/plans','Plans']];
  const active = h => hash===h||(h!=='#/'&&hash.startsWith(h));
  return (
    <nav className="sticky top-0 z-30 bg-ink/90 backdrop-blur border-b border-line">
      <div className="max-w-6xl mx-auto px-4 sm:px-6 h-14 flex items-center gap-5">
        <a href="#/" className="font-disp font-900 text-lg tracking-[0.06em] uppercase shrink-0">
          Trade<span className="text-amber glow-amber">/</span>Mirror
        </a>
        <div className="flex gap-1 overflow-x-auto">
          {tabs.map(([h,label])=>(
            <a key={h} href={h}
               className={`px-3 py-1.5 rounded-lg text-sm whitespace-nowrap transition ${active(h)?'bg-card text-amber':'text-lo hover:text-hi'}`}>
              {label}
            </a>
          ))}
        </div>
      </div>
    </nav>
  );
}

/* ----------------------------------------------------------------- stat cell */
function StatCell({label,children,sub}){
  return (
    <div className="px-5 py-4">
      <div className="text-[10px] uppercase tracking-[0.2em] text-lo font-medium mb-1.5">{label}</div>
      <div className="font-mono text-2xl leading-none">{children}</div>
      {sub && <div className="text-[11px] text-lo mt-1.5">{sub}</div>}
    </div>
  );
}

/* ----------------------------------------------------------------- overview */
function Overview({d}){
  const m = d.meta;
  return (
    <div className="space-y-8">
      <header className="pt-10">
        <div className="font-mono text-[11px] uppercase tracking-[0.22em] text-amber mb-3">
          free · open · updated {fmtDate(m.last_updated)}
        </div>
        <h1 className="font-disp font-900 text-3xl sm:text-4xl leading-tight max-w-3xl">
          {m.total_sessions} sessions. {m.win_rate}% win rate.<br/>No subscription. No login.
        </h1>
        <p className="text-lo text-sm sm:text-base leading-relaxed max-w-2xl mt-4">
          Every recap from one Indian intraday F&amp;O trader, turned into a searchable ledger —
          instruments, setups, entry reasoning and outcomes. Extracted from YouTube so you can
          study the method without scrubbing through hours of video.
        </p>
        <div className="flex items-center gap-2 mt-5 flex-wrap font-mono text-[11px]">
          <span className="px-2 py-1 rounded border border-profit/40 bg-profit/10 text-profit">● live</span>
          <span className="text-lo">{fmtDate(m.date_from)} → {fmtDate(m.date_to)}</span>
          <span className="text-lo">· latest {fmtDate(m.date_to)}</span>
        </div>
      </header>

      {/* stats bar */}
      <section className="bg-card border border-line rounded-xl overflow-hidden shadow-xl shadow-black/30">
        <div className="flex flex-wrap divide-x divide-line">
          <StatCell label="Win rate" sub={`${m.decided_legs} decided trades`}>
            <span className="text-profit">{m.win_rate}<span className="text-lo text-base">%</span></span>
          </StatCell>
          <StatCell label="Sessions" sub="live trading days">
            <span className="text-hi">{m.total_sessions}</span>
          </StatCell>
          <StatCell label="Total legs" sub="individual option trades">
            <span className="text-hi">{m.total_legs}</span>
          </StatCell>
          <StatCell label="Plans" sub="next-day predictions">
            <span className="text-violet">{m.plans_count}</span>
          </StatCell>
        </div>
      </section>

      {/* setup leaderboard preview */}
      <section>
        <div className="flex items-baseline justify-between mb-3">
          <h2 className="font-disp font-800 text-sm uppercase tracking-[0.16em] text-hi">Top setups by win rate</h2>
          <a href="#/setups" className="font-mono text-[11px] text-lo hover:text-amber">see all →</a>
        </div>
        <div className="bg-card border border-line rounded-xl divide-y divide-line">
          {d.setup_stats.slice(0,5).map((s,i)=>(
            <div key={i} className="flex items-center gap-3 px-4 py-3">
              <span className="font-mono text-[11px] text-lo w-5">{i+1}</span>
              <span className="text-sm text-hi grow">{s.setup}</span>
              <span className="font-mono text-[11px] text-lo">{s.wins}/{s.total}</span>
              <div className="w-24 h-1.5 bg-well rounded-full overflow-hidden hidden sm:block">
                <div className={`h-full ${s.win_rate>=60?'bg-profit':s.win_rate>=45?'bg-amber':'bg-loss'}`} style={{width:s.win_rate+'%'}}></div>
              </div>
              <span className={`font-mono text-sm font-semibold w-14 text-right ${s.win_rate>=60?'text-profit':s.win_rate>=45?'text-amber':'text-loss'}`}>{s.win_rate}%</span>
            </div>
          ))}
        </div>
      </section>

      {/* recent sessions */}
      <section>
        <div className="flex items-baseline justify-between mb-3">
          <h2 className="font-disp font-800 text-sm uppercase tracking-[0.16em] text-hi">Recent sessions</h2>
          <a href="#/sessions" className="font-mono text-[11px] text-lo hover:text-amber">see all →</a>
        </div>
        <div className="space-y-2">
          {d.sessions.slice(0,5).map(s=><SessionRow key={s.id} s={s}/>)}
        </div>
      </section>

      <Disclaimer/>
    </div>
  );
}

/* ----------------------------------------------------------------- sessions */
function SessionsPage({d}){
  const [q,setQ]=useState('');
  const [res,setRes]=useState('ALL');

  const sessions = useMemo(()=>d.sessions.filter(s=>{
    if(res!=='ALL'&&s.result!==res) return false;
    if(q){
      const hay=[s.title,...(s.instruments||[]),...(s.setups||[]),s.market_view,s.summary]
        .filter(Boolean).join(' ').toLowerCase();
      if(!hay.includes(q.toLowerCase())) return false;
    }
    return true;
  }),[d.sessions,q,res]);

  return (
    <div className="pt-8 space-y-5">
      <div>
        <h1 className="font-disp font-900 text-2xl text-hi">Sessions</h1>
        <p className="text-sm text-lo mt-1">{d.sessions.length} live sessions · newest first · all free</p>
      </div>
      <div className="flex flex-wrap items-center gap-3">
        <div className="inline-flex rounded-lg border border-line bg-well p-0.5">
          {['ALL','PROFIT','LOSS','MIXED'].map(o=>(
            <button key={o} onClick={()=>setRes(o)}
              className={`px-3 py-1 rounded-md text-[11px] font-mono uppercase tracking-wider transition ${res===o?'bg-card text-amber':'text-lo hover:text-hi'}`}>{o}</button>
          ))}
        </div>
        <input value={q} onChange={e=>setQ(e.target.value)} placeholder="Search instrument, setup, view…"
          className="grow min-w-[200px] bg-well border border-line rounded-lg px-3 py-1.5 text-sm placeholder:text-lo/60"/>
        <span className="font-mono text-[11px] text-lo">{sessions.length} shown</span>
      </div>
      <div className="space-y-2">
        {sessions.map(s=><SessionRow key={s.id} s={s}/>)}
        {sessions.length===0&&<div className="bg-card border border-line rounded-xl px-4 py-12 text-center text-lo text-sm">No sessions match.</div>}
      </div>
    </div>
  );
}

function SessionRow({s}){
  return (
    <a href={`#/session/${s.id}`} className="block bg-card border border-line rounded-lg px-4 py-3 hover:border-lo/40 transition">
      <div className="flex items-center gap-3 flex-wrap">
        <span className="font-mono text-[11px] text-lo w-24 shrink-0">{fmtDate(s.date)}</span>
        <ResultChip r={s.result}/>
        <span className="text-sm text-hi">{s.instruments.join(' · ')||'—'}</span>
        <span className="font-mono text-[11px] text-lo">{s.leg_count} leg{s.leg_count>1?'s':''}</span>
        {s.setups.slice(0,2).map((x,i)=><Chip key={i} tone="text-lo border-line bg-well">{x}</Chip>)}
        {s.net_points!=null&&<span className={`ml-auto font-mono text-sm font-semibold ${pnlClass(s.net_points)}`}>{fmtPts(s.net_points)} pts</span>}
      </div>
    </a>
  );
}

/* ----------------------------------------------------------------- detail */
function SessionDetail({id,d}){
  const s = d.sessions.find(x=>x.id===id);
  if(!s) return <div className="pt-8 text-lo text-sm">Not found. <a href="#/sessions" className="text-amber">Back →</a></div>;
  return (
    <div className="pt-8 space-y-5 max-w-3xl">
      <a href="#/sessions" className="font-mono text-[11px] text-lo hover:text-hi">← all sessions</a>
      <div className="flex items-center gap-3 flex-wrap">
        <h1 className="font-disp font-900 text-xl text-hi">{fmtDate(s.date)}</h1>
        <ResultChip r={s.result}/>
        {s.net_points!=null&&<span className={`font-mono text-lg font-bold ${pnlClass(s.net_points)}`}>{fmtPts(s.net_points)} pts</span>}
      </div>

      {s.market_view&&(
        <div className="bg-card border border-line rounded-xl p-4">
          <div className="font-mono text-[10px] uppercase tracking-[0.18em] text-amber mb-2">market view</div>
          <p className="text-sm text-hi/90 leading-relaxed">{s.market_view}</p>
        </div>
      )}

      <div className="bg-card border border-line rounded-xl overflow-hidden">
        <div className="px-4 py-2.5 border-b border-line font-mono text-[10px] uppercase tracking-[0.18em] text-lo">{s.legs.length} leg{s.legs.length>1?'s':''}</div>
        <div className="divide-y divide-line">
          {s.legs.map((l,i)=>(
            <div key={i} className="px-4 py-3">
              <div className="flex items-center gap-3 flex-wrap">
                <span className="font-mono text-sm text-hi min-w-[140px]">{l.instrument||'—'}</span>
                <DirChip d={l.direction}/>
                {(l.entry!=null||l.exit_price!=null)&&(
                  <span className="font-mono text-xs text-lo">
                    <span className="text-hi">{l.entry??'—'}</span>
                    <span className="mx-1 opacity-50">→</span>
                    <span className="text-hi">{l.exit_price??'—'}</span>
                  </span>
                )}
                {l.setup_type&&<Chip tone="text-lo border-line bg-well">{l.setup_type}</Chip>}
                <span className="ml-auto"><ResultChip r={l.outcome||'FLAT'}/></span>
              </div>
              {l.motive&&(
                <p className="text-xs text-hi/70 leading-relaxed mt-2">
                  <span className="font-mono text-[10px] uppercase tracking-wider text-profit mr-2">why</span>{l.motive}
                </p>
              )}
              {(l.entry_time||l.exit_time)&&(
                <div className="font-mono text-[10px] text-lo mt-1.5">{l.entry_time||'—'} → {l.exit_time||'—'}{l.quantity?` · qty ${l.quantity}`:''}</div>
              )}
            </div>
          ))}
        </div>
      </div>

      {s.summary&&(
        <div className="bg-card border border-line rounded-xl p-4">
          <div className="font-mono text-[10px] uppercase tracking-[0.18em] text-lo mb-2">recap summary</div>
          <p className="text-sm text-hi/85 leading-relaxed">{s.summary}</p>
        </div>
      )}

      <div className="aspect-video rounded-xl overflow-hidden border border-line bg-well">
        <iframe className="w-full h-full" src={`https://www.youtube.com/embed/${s.id}`}
          title="session video" loading="lazy"
          allow="accelerometer;clipboard-write;encrypted-media;picture-in-picture" allowFullScreen/>
      </div>
    </div>
  );
}

/* ----------------------------------------------------------------- setups */
function SetupsPage({d}){
  return (
    <div className="pt-8 space-y-7">
      <div>
        <h1 className="font-disp font-900 text-2xl text-hi">Setups</h1>
        <p className="text-sm text-lo mt-1">Win rate by setup. Only setups with 3+ trades shown.</p>
      </div>

      <div className="bg-card border border-line rounded-xl divide-y divide-line">
        {d.setup_stats.map((s,i)=>(
          <div key={i} className="flex items-center gap-3 px-4 py-3">
            <span className="font-mono text-[11px] text-lo w-5">{i+1}</span>
            <span className="text-sm text-hi grow">{s.setup}</span>
            <span className="font-mono text-[11px] text-lo w-14 text-right">{s.wins}/{s.total}</span>
            <div className="w-28 h-1.5 bg-well rounded-full overflow-hidden hidden sm:block">
              <div className={`h-full ${s.win_rate>=60?'bg-profit':s.win_rate>=45?'bg-amber':'bg-loss'}`} style={{width:s.win_rate+'%'}}></div>
            </div>
            <span className={`font-mono text-sm font-semibold w-16 text-right ${s.win_rate>=60?'text-profit':s.win_rate>=45?'text-amber':'text-loss'}`}>{s.win_rate}%</span>
          </div>
        ))}
      </div>

      <div>
        <h2 className="font-disp font-800 text-sm uppercase tracking-[0.16em] text-hi mb-3">By instrument</h2>
        <div className="grid sm:grid-cols-3 gap-3">
          {d.instrument_stats.map((it,i)=>(
            <div key={i} className="bg-card border border-line rounded-xl p-4">
              <div className="font-mono text-sm text-hi">{it.instrument}</div>
              <div className="font-mono text-2xl font-bold text-profit mt-2">{it.win_rate}<span className="text-lo text-sm">%</span></div>
              <div className="font-mono text-[11px] text-lo mt-1">{it.wins}/{it.total} trades</div>
            </div>
          ))}
        </div>
      </div>

      <div>
        <h2 className="font-disp font-800 text-sm uppercase tracking-[0.16em] text-hi mb-3">Month by month</h2>
        <div className="bg-card border border-line rounded-xl divide-y divide-line">
          {[...d.monthly].reverse().map((mo,i)=>(
            <div key={i} className="flex items-center gap-3 px-4 py-2.5">
              <span className="font-mono text-[11px] text-lo w-20">{mo.month}</span>
              <span className="font-mono text-[11px] text-lo">{mo.sessions} sessions</span>
              {mo.win_rate!=null&&(
                <React.Fragment>
                  <div className="ml-auto w-32 h-1.5 bg-well rounded-full overflow-hidden hidden sm:block">
                    <div className="h-full bg-profit" style={{width:mo.win_rate+'%'}}></div>
                  </div>
                  <span className="font-mono text-sm text-profit w-14 text-right">{mo.win_rate}%</span>
                </React.Fragment>
              )}
            </div>
          ))}
        </div>
      </div>
      <Disclaimer/>
    </div>
  );
}

/* ----------------------------------------------------------------- plans */
const SCN = [['gap_up','Gap up'],['flat','Flat'],['gap_down','Gap down']];
function PlansPage({d}){
  return (
    <div className="pt-8 space-y-5">
      <div>
        <h1 className="font-disp font-900 text-2xl text-hi">Next-day plans</h1>
        <p className="text-sm text-lo mt-1">{d.plans.length} pre-market predictions · newest first</p>
      </div>
      <div className="space-y-3">
        {d.plans.map((p,i)=>(
          <article key={i} className="bg-card border border-line rounded-xl p-5">
            <div className="flex items-center gap-2 flex-wrap">
              <span className="font-mono text-[11px] text-lo">plan of {fmtDate(p.date)}</span>
              {p.for_date&&<span className="font-mono text-[10px] text-lo">→ for {fmtDate(p.for_date)}</span>}
              {p.bias&&<Chip tone={biasTone(p.bias)}>{p.bias}</Chip>}
              <a href={p.video_url} target="_blank" rel="noreferrer"
                 className="ml-auto font-mono text-[10px] text-lo hover:text-amber">watch ↗</a>
            </div>
            {p.plan_summary&&<p className="text-sm text-hi/90 leading-relaxed mt-2.5">{p.plan_summary}</p>}
            {Object.keys(p.scenarios||{}).length>0&&(
              <div className="grid sm:grid-cols-3 gap-2 mt-3">
                {SCN.map(([k,label])=>p.scenarios[k]&&(
                  <div key={k} className="rounded-lg border border-line bg-well/40 p-2.5">
                    <div className="font-mono text-[10px] uppercase tracking-wider text-lo mb-1">{label}</div>
                    <div className="text-xs text-hi/85 leading-relaxed">{p.scenarios[k]}</div>
                  </div>
                ))}
              </div>
            )}
            {p.key_levels.length>0&&(
              <div className="flex flex-wrap gap-1.5 mt-3">
                {p.key_levels.map((l,j)=>(
                  <span key={j} title={l.note} className="font-mono text-[10px] px-2 py-0.5 rounded border border-line text-hi/80 bg-well/50">
                    {l.instrument} <span className="text-amber">{l.level}</span>
                  </span>
                ))}
              </div>
            )}
          </article>
        ))}
      </div>
    </div>
  );
}

/* ----------------------------------------------------------------- disclaimer */
function Disclaimer(){
  return (
    <section className="bg-well/50 border border-line rounded-xl p-5 text-[12px] text-lo leading-relaxed">
      <div className="font-mono text-[10px] uppercase tracking-[0.18em] text-lo/70 mb-2">about this site</div>
      <p className="mb-2">Independent analysis project — not affiliated with or endorsed by the trader whose public videos it summarises.</p>
      <p className="mb-2">Outcomes reflect what the trader states in his recaps — self-reported, not independently audited. Win rates with small sample sizes are not statistically reliable.</p>
      <p>Nothing here is investment advice. Trading options carries substantial risk.</p>
    </section>
  );
}

/* ----------------------------------------------------------------- loading */
function Skeleton(){
  return (
    <div className="space-y-3 pt-8">
      {[1,2,3].map(i=>(
        <div key={i} className="bg-card border border-line rounded-lg px-4 py-3 animate-pulse">
          <div className="flex gap-3">
            <div className="h-3 w-20 bg-well rounded"></div>
            <div className="h-3 w-12 bg-well rounded"></div>
            <div className="h-3 w-32 bg-well rounded"></div>
          </div>
        </div>
      ))}
    </div>
  );
}

/* ----------------------------------------------------------------- app */
function App(){
  const hash = useHash();
  const [data,setData] = useState(null);
  const [err,setErr]   = useState('');

  useEffect(()=>{
    fetch('data/data.json').then(r=>r.json()).then(setData)
      .catch(()=>setErr('Could not load data. Run the site from a web server, not by opening the file directly.'));
  },[]);

  if(err)  return <div className="max-w-xl mx-auto px-6 py-20 text-center text-lo text-sm">{err}</div>;
  if(!data) return <div><Nav/><main className="max-w-6xl mx-auto px-4 sm:px-6"><Skeleton/></main></div>;

  let page;
  if(hash.startsWith('#/session/'))  page = <SessionDetail id={decodeURIComponent(hash.slice('#/session/'.length))} d={data}/>;
  else if(hash.startsWith('#/sessions')) page = <SessionsPage d={data}/>;
  else if(hash.startsWith('#/setups'))   page = <SetupsPage   d={data}/>;
  else if(hash.startsWith('#/plans'))    page = <PlansPage    d={data}/>;
  else                                   page = <Overview     d={data}/>;

  return (
    <div>
      <Nav/>
      <main className="max-w-6xl mx-auto px-4 sm:px-6 pb-10">{page}</main>
      <footer className="border-t border-line py-6 text-center font-mono text-[10px] text-lo/50 tracking-wide">
        trade mirror · independent analysis · free & open
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
