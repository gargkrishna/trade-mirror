<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
<title>Trade Mirror — Intraday Hunter ka verified record</title>
<meta name="description" content="Intraday Hunter ki har trade, verified. Aaj ka result, plan vs actual, aur best setups — sab ek jagah." />

<!-- Fonts: Anek Devanagari covers Hindi+Latin in one family (no FOIT for Hindi labels); Archivo for the stamp/heavy display -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Anek+Devanagari:wght@400;500;600;700&family=Archivo:wght@600;700;800;900&family=Archivo+Black&display=swap" rel="stylesheet" />

<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        ink:    '#14110F',   // near-black warm, page text
        paper:  '#FBF7F0',   // warm off-white "newsprint" bg
        card:   '#FFFFFF',
        win:    '#0B7A3B',   // deep NSE-green (profit) — not neon
        winbg:  '#E7F5EC',
        loss:   '#C42026',   // BSE-red (loss)
        lossbg: '#FBE9E9',
        gold:   '#E0A100',   // accent / streak fire / highlights
        slate:  '#6B6258',   // muted captions
        line:   '#E9E2D6'    // hairline borders
      },
      fontFamily: {
        body: ['"Anek Devanagari"','system-ui','sans-serif'],
        stamp:['"Archivo Black"','"Archivo"','system-ui','sans-serif'],
        num:  ['"Archivo"','system-ui','sans-serif']
      }
    }
  }
}
</script>
<style>
  html,body{background:#FBF7F0; overflow-x:hidden;}
  *{ -webkit-tap-highlight-color: transparent; }
  /* the rotated stamp must never create a horizontal scrollbar */
  .stamp{ max-width:100%; }
  /* The signature: result stamp. A rotated, double-ruled "verdict" like an ink stamp on a broker statement. */
  .stamp{
    border:3px solid currentColor; border-radius:10px;
    padding:.05em .42em; display:inline-flex; align-items:center; gap:.12em;
    transform:rotate(-7deg); position:relative; letter-spacing:.04em;
    box-shadow: inset 0 0 0 2px rgba(255,255,255,.6);
  }
  .stamp::after{ content:""; position:absolute; inset:5px; border:1.5px solid currentColor; border-radius:6px; opacity:.55;}
  @keyframes stampIn{0%{transform:rotate(-7deg) scale(2.2);opacity:0}55%{transform:rotate(-7deg) scale(.92);opacity:1}100%{transform:rotate(-7deg) scale(1)}}
  .stamp-anim{ animation: stampIn .42s cubic-bezier(.2,.8,.3,1.2) both;}
  @keyframes barGrow{from{width:0}to{width:var(--w)}}
  .bar-anim{ animation: barGrow .7s cubic-bezier(.3,1,.4,1) both;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .fadeup{ animation: fadeUp .35s ease both;}
  .tabnum{ font-variant-numeric: tabular-nums;}
  @media (prefers-reduced-motion: reduce){
    .stamp-anim,.bar-anim,.fadeup{animation:none !important;}
  }
  /* hide scrollbar on the horizontal pill row */
  .noscroll::-webkit-scrollbar{display:none;}
  .noscroll{ -ms-overflow-style:none; scrollbar-width:none;}
</style>
</head>
<body class="font-body text-ink">
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone@7.26.0/babel.min.js"></script>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useMemo, useRef } = React;

/* ---------- tiny helpers ---------- */
const fmt = (n)=> (n==null) ? '—' : (n>=0?'+':'') + n.toFixed(2);
// Indian rupee: grouped (1,00,000) with lakh/crore short-form for big numbers
const inr = (n)=>{
  if(n==null) return '—';
  const sign = n<0?'-':'+';
  const a = Math.abs(Math.round(n));
  if(a>=10000000){ return `${sign}₹${(a/10000000).toFixed(a%10000000?2:0)}Cr`; }
  if(a>=100000){ return `${sign}₹${(a/100000).toFixed(a%100000?2:0)}L`; }
  return `${sign}₹${a.toLocaleString('en-IN')}`;
};
// his words for trade direction (from transcript analysis: बाइंग साइड / सेलिंग साइड)
const dirHi = (d)=> d==='SHORT' ? 'सेलिंग' : 'बाइंग';
const ytThumb = (url)=>{ const id=ytId(url); return id?`https://img.youtube.com/vi/${id}/hqdefault.jpg`:''; };
const dayName = (iso)=>{
  const d = new Date(iso+'T00:00:00');
  const days=['Ravi','Som','Mangal','Budh','Guru','Shukra','Shani'];
  const mon=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return {dow:days[d.getDay()], d:d.getDate(), m:mon[d.getMonth()], full:`${d.getDate()} ${mon[d.getMonth()]} ${d.getFullYear()}`};
};
const sessionPts = (s)=> s.legs.reduce((a,l)=>a+(l.pnl_points||0),0);
const sessionRs = (s)=> (typeof s.pnl_rupees==='number') ? s.pnl_rupees : s.legs.reduce((a,l)=>a+(l.pnl_rupees||0),0);
const isWin = (s)=> s.result==='PROFIT';
const ytId = (url)=>{ try{ const u=new URL(url); return u.searchParams.get('v') || u.pathname.split('/').pop(); }catch(e){return '';} };

/* shareable WhatsApp message */
function shareSession(s){
  const d = dayName(s.date);
  const verdict = isWin(s) ? '✅ PROFIT' : '❌ LOSS';
  const rs = inr(sessionRs(s));
  const pts = fmt(sessionPts(s));
  const legs = s.legs.map(l=>`• ${l.instrument} ${l.direction} → ${inr(l.pnl_rupees)}`).join('\n');
  const txt =
`📊 Intraday Hunter — ${d.full}
Result: ${verdict}  ${rs}  (${pts} pts)

${legs}

Poora verified record dekho 👇
${location.origin}${location.pathname}#/session/${s.date}

— Trade Mirror`;
  const url = `https://wa.me/?text=${encodeURIComponent(txt)}`;
  window.open(url,'_blank');
}

/* ---------- result stamp (THE signature element) ---------- */
function Stamp({win, size='text-4xl', animate=false}){
  return (
    <span className={`stamp font-stamp ${size} ${animate?'stamp-anim':''} ${win?'text-win':'text-loss'}`}>
      {win? 'PROFIT':'LOSS'}
    </span>
  );
}

/* ---------- streak row: last 20 as fire/ash dots ---------- */
function Streak({streak}){
  const wins = streak.filter(x=>x==='WIN').length;
  return (
    <div>
      <div className="flex items-center justify-between mb-1.5">
        <span className="text-sm font-600 text-slate">पिछली 20 सेशन</span>
        <span className="text-sm font-700"><span className="text-win">{wins} जीत</span> · <span className="text-loss">{streak.length-wins} हार</span></span>
      </div>
      <div className="flex gap-[3px] flex-wrap">
        {streak.map((x,i)=>(
          <div key={i}
            title={x}
            className={`h-7 flex-1 min-w-[10px] rounded-[3px] ${x==='WIN'?'bg-win':'bg-loss/85'}`}/>
        ))}
      </div>
    </div>
  );
}

/* ---------- collapsed session card (thumbnail + scorecard row) ---------- */
function SessionCard({s, expandedDefault=false, plan=null}){
  const [open,setOpen]=useState(expandedDefault);
  const d = dayName(s.date);
  const win = isWin(s);
  const pts = sessionPts(s);
  const rs = sessionRs(s);
  const thumb = ytThumb(s.video_url);
  const biasHi = plan ? (plan.bias_hi || plan.bias) : null;
  const biasCls = plan ? ({bullish:'bg-win/10 text-win',bearish:'bg-loss/10 text-loss',neutral:'bg-ink/5 text-slate',range:'bg-ink/5 text-slate'}[plan.bias]||'bg-ink/5 text-slate') : '';
  return (
    <div className={`rounded-2xl border overflow-hidden bg-card ${win?'border-win/25':'border-loss/25'}`}>
      <button onClick={()=>setOpen(o=>!o)} className="w-full text-left">
        {/* top row: thumbnail | result */}
        <div className="flex">
          {/* video thumbnail with play badge + date chip */}
          <div className="relative w-28 shrink-0 bg-ink/5" style={{aspectRatio:'16/11'}}>
            {thumb
              ? <img src={thumb} alt="" loading="lazy" className="w-full h-full object-cover"
                  onError={(e)=>{e.target.style.display='none';}}/>
              : <div className="w-full h-full grid place-items-center text-slate text-xs">video</div>}
            <span className="absolute inset-0 grid place-items-center">
              <span className="w-8 h-8 rounded-full bg-black/55 grid place-items-center">
                <svg className="w-3.5 h-3.5 text-white ml-0.5" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
              </span>
            </span>
            <span className="absolute top-1 left-1 px-1.5 py-0.5 rounded bg-black/60 text-white text-[10px] font-700 tabnum">{d.d} {d.m}</span>
          </div>

          {/* result block — RUPEES is the headline */}
          <div className={`flex-1 min-w-0 p-3 flex flex-col justify-center ${win?'bg-winbg/40':'bg-lossbg/40'}`}>
            <div className="flex items-center justify-between gap-2">
              <div className="min-w-0">
                <div className={`font-num font-900 tabnum leading-none ${win?'text-win':'text-loss'}`} style={{fontSize:'clamp(22px,7vw,30px)'}}>{inr(rs)}</div>
                <div className="text-[11px] text-slate font-600 mt-0.5">{fmt(pts)} pts · {s.legs.length} ट्रेड</div>
              </div>
              <div className="shrink-0"><Stamp win={win} size="text-sm"/></div>
            </div>
            <div className="flex gap-1 mt-1.5 flex-wrap items-center">
              {biasHi && <span className={`text-[10px] font-700 px-1.5 py-0.5 rounded ${biasCls}`}>प्लान: {biasHi}</span>}
              {[...new Set(s.legs.map(l=>l.direction))].map(dir=>(
                <span key={dir} className={`text-[10px] font-700 px-1.5 py-0.5 rounded ${dir==='SHORT'?'bg-loss/10 text-loss':'bg-win/10 text-win'}`}>{dirHi(dir)}</span>
              ))}
              <svg className={`w-4 h-4 text-slate ml-auto transition-transform ${open?'rotate-180':''}`} viewBox="0 0 20 20" fill="currentColor"><path d="M5 7l5 5 5-5z"/></svg>
            </div>
          </div>
        </div>
      </button>

      {open && (
        <div className="px-3.5 pb-3.5 pt-3 fadeup">
          {s.view_hi && <p className="text-[13px] text-ink/85 leading-relaxed mb-3 border-l-2 border-gold pl-2.5 bg-gold/5 py-2 rounded-r">{s.view_hi}</p>}
          <div className="space-y-2">
            {s.legs.map((l,i)=>(
              <div key={i} className="rounded-xl border border-line p-2.5">
                <div className="flex items-center justify-between gap-2 mb-1.5">
                  <span className="font-700 text-[13px] truncate">{l.instrument}</span>
                  <span className={`text-[11px] font-700 px-1.5 py-0.5 rounded shrink-0 ${l.direction==='SHORT'?'bg-loss/10 text-loss':'bg-win/10 text-win'}`}>{dirHi(l.direction)}</span>
                </div>
                <div className="flex items-end justify-between gap-2">
                  <div className="grid grid-cols-2 gap-x-3 text-[11px]">
                    <span className="text-slate">एंट्री <b className="text-ink font-num">{l.entry ?? '—'}</b></span>
                    <span className="text-slate">एग्जिट <b className="text-ink font-num">{l.exit ?? '—'}</b></span>
                  </div>
                  <div className="text-right">
                    <div className={`font-num font-800 text-base tabnum ${(l.pnl_rupees||0)>=0?'text-win':'text-loss'}`}>{inr(l.pnl_rupees)}</div>
                    <div className="text-[10px] text-slate">{fmt(l.pnl_points)} pts</div>
                  </div>
                </div>
                <div className="flex items-center justify-between text-[11px] text-slate mt-1.5 pt-1.5 border-t border-line">
                  <span>🕒 {l.entry_time||'—'}→{l.exit_time||'—'}</span>
                  <span className="px-1.5 py-0.5 rounded bg-ink/5 font-600 text-ink/70">{l.setup_hi || l.setup_type}</span>
                </div>
              </div>
            ))}
          </div>
          <div className="flex gap-2 mt-3">
            <a href={`#/session/${s.date}`} className="flex-1 text-center py-2.5 rounded-xl bg-ink text-paper font-700 text-sm">Poori detail</a>
            <button onClick={(e)=>{e.stopPropagation();shareSession(s);}} className="px-4 py-2.5 rounded-xl bg-[#25D366] text-white font-700 text-sm flex items-center gap-1.5">
              <svg className="w-4 h-4" viewBox="0 0 24 24" fill="currentColor"><path d="M.057 24l1.687-6.163a11.867 11.867 0 01-1.587-5.946C.16 5.335 5.495 0 12.05 0a11.82 11.82 0 018.413 3.488 11.82 11.82 0 013.48 8.414c-.003 6.557-5.338 11.892-11.893 11.892a11.9 11.9 0 01-5.688-1.448L.057 24zm6.597-3.807c1.676.995 3.276 1.591 5.392 1.592 5.448 0 9.886-4.434 9.889-9.885.002-5.462-4.415-9.89-9.881-9.892-5.452 0-9.887 4.434-9.889 9.884a9.87 9.87 0 001.515 5.26l-.999 3.648 3.974-.755z"/></svg>
              Share
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

/* ---------- setup leaderboard row (reliability without numeracy) ---------- */
function SetupRow({s}){
  // confidence as words, not just % — for low-numeracy users
  const word = s.win_rate>=85?'बहुत मजबूत': s.win_rate>=70?'मजबूत': s.win_rate>=50?'ठीक-ठाक': 'कमज़ोर';
  const wordColor = s.win_rate>=70?'text-win': s.win_rate>=50?'text-gold':'text-loss';
  const barColor = s.win_rate>=70?'bg-win': s.win_rate>=50?'bg-gold':'bg-loss';
  return (
    <div className="py-2.5 border-b border-line last:border-0">
      <div className="flex items-baseline justify-between gap-2 mb-1.5">
        <span className="font-700 text-[14px]">{s.setup_hi || s.setup}</span>
        <span className={`text-[12px] font-700 ${wordColor}`}>{word}</span>
      </div>
      <div className="flex items-center gap-2">
        <div className="flex-1 h-3 rounded-full bg-ink/5 overflow-hidden">
          <div className={`h-full rounded-full bar-anim ${barColor}`} style={{'--w':`${s.win_rate}%`, width:`${s.win_rate}%`}}/>
        </div>
        <span className="text-[12px] font-num font-700 tabnum w-10 text-right">{Math.round(s.win_rate)}%</span>
      </div>
      <div className="text-[11px] text-slate mt-1">
        {s.wins} जीत / {s.total} ट्रेड {!s.proven && <span className="text-gold">· कम सैंपल</span>}
      </div>
    </div>
  );
}

/* ---------- plan scorecard (predicted vs actual) ---------- */
function PlanCard({p, sessions}){
  const d = dayName(p.date);
  const matched = p.matched_session ? sessions.find(s=>s.date===p.matched_session) : null;
  const biasColor = {bullish:'text-win bg-winbg', bearish:'text-loss bg-lossbg', neutral:'text-slate bg-ink/5', range:'text-slate bg-ink/5'}[p.bias] || 'text-slate bg-ink/5';
  const biasHi = p.bias_hi || p.bias;
  return (
    <div className="rounded-2xl border border-line bg-card overflow-hidden">
      <div className="p-3.5">
        <div className="flex items-center justify-between mb-2">
          <div className="text-[13px] font-700 text-slate">{d.full} · {d.dow}</div>
          {!matched && <span className="text-[11px] font-700 px-2 py-0.5 rounded-full bg-gold/15 text-gold">अगले दिन का प्लान</span>}
        </div>
        <div className="flex items-center gap-2 mb-2.5">
          <span className="text-[12px] text-slate">उन्होंने सोचा:</span>
          <span className={`text-sm font-700 px-2.5 py-0.5 rounded-full ${biasColor}`}>{biasHi}</span>
        </div>
        <p className="text-[13px] text-ink/85 leading-relaxed mb-3">{p.plan_summary_hi || p.plan_summary}</p>

        {/* scenarios — his exact opening vocabulary */}
        <div className="grid grid-cols-3 gap-1.5 mb-3">
          {[['gap_up','गैप अप','▲'],['flat','फ्लैट','▬'],['gap_down','गैप डाउन','▼']].map(([k,lab,ic])=>(
            <div key={k} className="rounded-lg border border-line p-2 text-center">
              <div className="text-[11px] font-700 text-slate mb-0.5">{ic} {lab}</div>
              <div className="text-[11px] text-ink/75 leading-tight">{p.scenarios[k]}</div>
            </div>
          ))}
        </div>

        {/* key levels */}
        <div className="flex flex-wrap gap-1.5 mb-1">
          {p.key_levels.map((lv,i)=>(
            <span key={i} className={`text-[11px] font-num font-700 tabnum px-2 py-0.5 rounded ${lv.type==='resistance'?'bg-loss/10 text-loss':'bg-win/10 text-win'}`}>
              {lv.level} {lv.type==='resistance'?'रेज़िस्टेंस':'सपोर्ट'}
            </span>
          ))}
        </div>
      </div>

      {/* verdict strip: predicted vs actual */}
      {matched ? (
        <a href={`#/session/${matched.date}`} className={`block px-3.5 py-2.5 flex items-center justify-between ${isWin(matched)?'bg-winbg':'bg-lossbg'}`}>
          <span className="text-[12px] font-600 text-ink/70">मार्केट ने क्या किया:</span>
          <span className="flex items-center gap-2">
            <span className={`font-700 text-base ${isWin(matched)?'text-win':'text-loss'}`}>{inr(sessionRs(matched))}</span>
            <Stamp win={isWin(matched)} size="text-base"/>
          </span>
        </a>
      ) : (
        <div className="px-3.5 py-2.5 bg-ink/[.03] text-[12px] text-slate text-center font-600">रिज़ल्ट अभी आना बाकी है</div>
      )}
    </div>
  );
}

/* ====================== PAGES ====================== */

function Home({data, go}){
  const latest = data.sessions[0];
  const d = dayName(latest.date);
  const win = isWin(latest);
  const today = new Date(); today.setHours(0,0,0,0);
  const latestDate = new Date(latest.date+'T00:00:00');
  const isToday = latestDate.getTime()===today.getTime();

  return (
    <div className="space-y-5">
      {/* HERO — latest session, the answer to "aaj kya hua" in <2s */}
      <div className="fadeup">
        <div className="flex items-center gap-2 mb-2">
          <span className="text-[13px] font-700 text-slate uppercase tracking-wide">{isToday?'आज का रिज़ल्ट':'पिछली सेशन'}</span>
          <span className="text-[12px] text-slate">· {d.full}</span>
        </div>

        <div className={`rounded-3xl p-5 border-2 ${win?'border-win/30 bg-winbg':'border-loss/30 bg-lossbg'}`}>
          <div className="flex items-center justify-between gap-2 mb-1">
            <span className="text-sm font-700 text-slate">{latest.legs.length} ट्रेड · रिज़ल्ट</span>
            <div className="shrink-0 overflow-visible"><Stamp win={win} size="text-2xl" animate={true}/></div>
          </div>
          <div className={`font-num font-900 leading-none tabnum ${win?'text-win':'text-loss'}`} style={{fontSize:'clamp(44px,15vw,72px)'}}>
            {inr(sessionRs(latest))}
          </div>
          <div className="text-sm font-600 text-slate mt-1">{fmt(sessionPts(latest))} points</div>

          {latest.view_hi && (
            <p className="text-[13px] text-ink/85 leading-relaxed mt-4 border-l-2 border-gold pl-2.5">{latest.view_hi}</p>
          )}

          <div className="grid grid-cols-2 gap-2 mt-4">
            {latest.legs.slice(0,4).map((l,i)=>(
              <div key={i} className="rounded-xl bg-card/70 border border-line p-2">
                <div className="text-[11px] font-700 truncate">{l.instrument}</div>
                <div className={`font-num font-800 text-sm tabnum ${(l.pnl_rupees||0)>=0?'text-win':'text-loss'}`}>{inr(l.pnl_rupees)}</div>
              </div>
            ))}
          </div>

          <div className="flex gap-2 mt-4">
            <a href={`#/session/${latest.date}`} className="flex-1 text-center py-3 rounded-xl bg-ink text-paper font-700">Poori detail dekho</a>
            <button onClick={()=>shareSession(latest)} className="px-4 py-3 rounded-xl bg-[#25D366] text-white font-700 flex items-center gap-1.5">
              <svg className="w-5 h-5" viewBox="0 0 24 24" fill="currentColor"><path d="M.057 24l1.687-6.163a11.867 11.867 0 01-1.587-5.946C.16 5.335 5.495 0 12.05 0a11.82 11.82 0 018.413 3.488 11.82 11.82 0 013.48 8.414c-.003 6.557-5.338 11.892-11.893 11.892a11.9 11.9 0 01-5.688-1.448L.057 24zm6.597-3.807c1.676.995 3.276 1.591 5.392 1.592 5.448 0 9.886-4.434 9.889-9.885.002-5.462-4.415-9.89-9.881-9.892-5.452 0-9.887 4.434-9.889 9.884a9.87 9.87 0 001.515 5.26l-.999 3.648 3.974-.755z"/></svg>
            </button>
          </div>
        </div>
      </div>

      {/* streak */}
      <div className="rounded-2xl border border-line bg-card p-4">
        <Streak streak={data.streak}/>
      </div>

      {/* total money earned — real, from DB */}
      {typeof data.meta.total_money==='number' && (
        <div className={`rounded-2xl border-2 p-4 flex items-center justify-between ${data.meta.total_money>=0?'border-win/25 bg-winbg/50':'border-loss/25 bg-lossbg/50'}`}>
          <div>
            <div className="text-[12px] font-700 text-slate">{data.monthly?.length||0} महीने का कुल</div>
            <div className="text-[11px] text-slate">{data.meta.total_sessions} सेशन में</div>
          </div>
          <div className={`font-num font-900 tabnum ${data.meta.total_money>=0?'text-win':'text-loss'}`} style={{fontSize:'clamp(28px,9vw,40px)'}}>{inr(data.meta.total_money)}</div>
        </div>
      )}

      {/* headline stats — big numbers, Hindi labels */}
      <div className="grid grid-cols-3 gap-2.5">
        <Stat big={`${data.meta.win_rate}%`} label="जीत का रिकॉर्ड" sub={`${data.meta.decided_trades} ट्रेड`} accent="win"/>
        <Stat big={data.meta.total_sessions} label="ट्रेडिंग सेशन" sub="रिकॉर्ड किए"/>
        <Stat big={data.meta.total_legs} label="कुल ट्रेड" sub="निकाले गए"/>
      </div>

      <a href="#/sessions" className="block text-center py-3.5 rounded-2xl border-2 border-ink font-700">Saari sessions dekho →</a>

      {/* what is this — below fold, for the curious, never blocks the data */}
      <div className="rounded-2xl bg-ink text-paper/90 p-4 text-[13px] leading-relaxed">
        <div className="font-700 text-paper mb-1">Ye kya hai?</div>
        Trade Mirror, <b>Intraday Hunter</b> ke YouTube videos se nikali gayi har trade ko verify karke yahan dikhata hai. Aapko har video dekhne ki zaroorat nahi — yahan poora record milta hai. <span className="text-paper/60">Ye ek independent project hai, Intraday Hunter se affiliated nahi.</span>
      </div>
    </div>
  );
}

function Stat({big,label,sub,accent}){
  const c = accent==='win'?'text-win':'text-ink';
  return (
    <div className="rounded-2xl border border-line bg-card p-3 text-center">
      <div className={`font-num font-900 tabnum leading-none ${c}`} style={{fontSize:'clamp(20px,6vw,28px)'}}>{big}</div>
      <div className="text-[12px] font-700 mt-1">{label}</div>
      <div className="text-[10px] text-slate">{sub}</div>
    </div>
  );
}

function Sessions({data}){
  const [filter,setFilter]=useState('ALL');
  const list = useMemo(()=> data.sessions.filter(s=> filter==='ALL'? true : filter==='WIN'? isWin(s) : !isWin(s)), [filter,data]);
  const pills=[['ALL','Sabhi'],['WIN','Sirf Profit'],['LOSS','Sirf Loss']];
  return (
    <div>
      <h1 className="text-2xl font-800 mb-3">Saari Sessions</h1>
      <div className="flex gap-2 mb-4">
        {pills.map(([k,lab])=>(
          <button key={k} onClick={()=>setFilter(k)}
            className={`px-3.5 py-2 rounded-full text-[13px] font-700 border-2 ${filter===k?(k==='WIN'?'bg-win text-white border-win':k==='LOSS'?'bg-loss text-white border-loss':'bg-ink text-paper border-ink'):'border-line text-slate'}`}>
            {lab}
          </button>
        ))}
      </div>
      <div className="space-y-3">
        {list.map((s,i)=> <SessionCard key={s.date} s={s} plan={data.plans.find(p=>p.matched_session===s.date)}/>)}
      </div>
    </div>
  );
}

function SessionDetail({data, date}){
  const s = data.sessions.find(x=>x.date===date);
  if(!s) return <Empty msg="Ye session nahi mili."/>;
  const d = dayName(s.date); const win=isWin(s);
  const plan = data.plans.find(p=>p.matched_session===s.date);
  const vid = ytId(s.video_url);
  return (
    <div className="space-y-4">
      <a href="#/sessions" className="text-[13px] text-slate font-600">← Saari sessions</a>
      <div className={`rounded-3xl p-5 border-2 ${win?'border-win/30 bg-winbg':'border-loss/30 bg-lossbg'}`}>
        <div className="flex items-start justify-between">
          <div className="min-w-0">
            <div className="text-[13px] font-700 text-slate">{d.full} · {d.dow}</div>
            <div className="flex items-center gap-3 mt-1">
              <div className={`font-num font-900 tabnum leading-none ${win?'text-win':'text-loss'}`} style={{fontSize:'clamp(40px,13vw,64px)'}}>{inr(sessionRs(s))}</div>
              <div className="shrink-0"><Stamp win={win} size="text-2xl" animate={true}/></div>
            </div>
            <div className="text-sm text-slate font-600 mt-1">{fmt(sessionPts(s))} points · {s.legs.length} ट्रेड</div>
          </div>
        </div>
        {s.view_hi && <p className="text-[13px] text-ink/85 leading-relaxed mt-4 border-l-2 border-gold pl-2.5">{s.view_hi}</p>}
      </div>

      {/* legs */}
      <div>
        <h2 className="font-800 text-lg mb-2">ट्रेड ({s.legs.length})</h2>
        <div className="space-y-2">
          {s.legs.map((l,i)=>(
            <div key={i} className={`rounded-2xl border bg-card p-3 ${(l.pnl_rupees||0)>=0?'border-win/25':'border-loss/25'}`}>
              <div className="flex items-center justify-between mb-2">
                <span className="font-700 text-sm">{l.instrument}</span>
                <span className={`text-[11px] font-700 px-2 py-0.5 rounded ${l.direction==='SHORT'?'bg-loss/10 text-loss':'bg-win/10 text-win'}`}>{dirHi(l.direction)} साइड</span>
              </div>
              <div className="flex items-end justify-between gap-3 mb-2">
                <div className="grid grid-cols-3 gap-x-3 text-center">
                  <Mini label="एंट्री" v={l.entry ?? '—'}/>
                  <Mini label="एग्जिट" v={l.exit ?? '—'}/>
                  <Mini label="क्वांटिटी" v={l.quantity ?? '—'}/>
                </div>
                <div className="text-right shrink-0">
                  <div className={`font-num font-900 text-xl tabnum leading-none ${(l.pnl_rupees||0)>=0?'text-win':'text-loss'}`}>{inr(l.pnl_rupees)}</div>
                  <div className="text-[10px] text-slate mt-0.5">{fmt(l.pnl_points)} pts</div>
                </div>
              </div>
              <div className="text-[12px] text-ink/75 space-y-1">
                <div>🎯 <b>एंट्री क्यों ली:</b> {l.motive_hi}</div>
                <div>🚪 <b>क्यों निकले:</b> {l.exit_hi}</div>
                <div className="flex items-center justify-between pt-1">
                  <span className="text-slate">🕒 {l.entry_time||'—'} → {l.exit_time||'—'}</span>
                  <span className="px-2 py-0.5 rounded bg-ink/5 font-600">{l.setup_hi || l.setup_type}</span>
                </div>
              </div>
            </div>
          ))}
        </div>
      </div>

      {/* plan vs actual */}
      {plan && (
        <div>
          <h2 className="font-800 text-lg mb-2">रात का प्लान vs असली रिज़ल्ट</h2>
          <PlanCard p={plan} sessions={data.sessions}/>
        </div>
      )}

      {/* video */}
      {vid && (
        <div>
          <h2 className="font-800 text-lg mb-2">Video</h2>
          <div className="rounded-2xl overflow-hidden border border-line bg-black" style={{aspectRatio:'16/9'}}>
            <iframe loading="lazy" className="w-full h-full" src={`https://www.youtube.com/embed/${vid}`} title="session video" allowFullScreen frameBorder="0"></iframe>
          </div>
        </div>
      )}

      <button onClick={()=>shareSession(s)} className="w-full py-3.5 rounded-2xl bg-[#25D366] text-white font-700 flex items-center justify-center gap-2">
        <svg className="w-5 h-5" viewBox="0 0 24 24" fill="currentColor"><path d="M.057 24l1.687-6.163a11.867 11.867 0 01-1.587-5.946C.16 5.335 5.495 0 12.05 0a11.82 11.82 0 018.413 3.488 11.82 11.82 0 013.48 8.414c-.003 6.557-5.338 11.892-11.893 11.892a11.9 11.9 0 01-5.688-1.448L.057 24zm6.597-3.807c1.676.995 3.276 1.591 5.392 1.592 5.448 0 9.886-4.434 9.889-9.885.002-5.462-4.415-9.89-9.881-9.892-5.452 0-9.887 4.434-9.889 9.884a9.87 9.87 0 001.515 5.26l-.999 3.648 3.974-.755z"/></svg>
        WhatsApp pe share karo
      </button>
    </div>
  );
}
function Mini({label,v,c='text-ink'}){
  return <div><div className="text-[10px] text-slate">{label}</div><div className={`font-num font-800 text-sm tabnum ${c}`}>{v}</div></div>;
}

function Setups({data}){
  const proven = data.setup_stats.filter(s=>s.proven);
  const small  = data.setup_stats.filter(s=>!s.proven);
  const [showAll,setShowAll]=useState(false);
  return (
    <div className="space-y-6">
      <h1 className="text-2xl font-800">सेटअप और रिकॉर्ड</h1>

      <div className="rounded-2xl border border-line bg-card p-4">
        <h2 className="font-800 mb-1">पक्के सेटअप</h2>
        <p className="text-[12px] text-slate mb-2">ये वो सेटअप हैं जो उन्होंने सबसे ज़्यादा बार ट्रेड किए — इन पर भरोसा बनता है।</p>
        <div>{proven.map((s,i)=> <SetupRow key={i} s={s}/>)}</div>
      </div>

      <div className="rounded-2xl border border-line bg-card p-4">
        <div className="flex items-center justify-between mb-1">
          <h2 className="font-800">कभी-कभी वाले सेटअप</h2>
          <span className="text-[11px] text-slate">{small.length} सेटअप</span>
        </div>
        <p className="text-[12px] text-slate mb-2">कम बार इस्तेमाल हुए — सैंपल छोटा है, इसलिए रिज़ल्ट पक्का नहीं।</p>
        <div>{(showAll?small:small.slice(0,5)).map((s,i)=> <SetupRow key={i} s={s}/>)}</div>
        {small.length>5 && (
          <button onClick={()=>setShowAll(v=>!v)} className="w-full mt-2 py-2 text-[13px] font-700 text-ink/70">
            {showAll? 'कम दिखाओ' : `सभी ${small.length} देखो →`}
          </button>
        )}
      </div>

      <div className="rounded-2xl border border-line bg-card p-4">
        <h2 className="font-800 mb-3">इंडेक्स-वाइज़ रिकॉर्ड</h2>
        <div className="space-y-3">
          {data.instrument_stats.map((s,i)=>(
            <div key={i}>
              <div className="flex justify-between text-[13px] mb-1"><span className="font-700">{s.instrument}</span><span className="font-num font-700 tabnum">{Math.round(s.win_rate)}%</span></div>
              <div className="h-3 rounded-full bg-ink/5 overflow-hidden">
                <div className="h-full rounded-full bg-win bar-anim" style={{'--w':`${s.win_rate}%`, width:`${s.win_rate}%`}}/>
              </div>
              <div className="text-[11px] text-slate mt-0.5">{s.wins}/{s.total} ट्रेड</div>
            </div>
          ))}
        </div>
      </div>

      <div className="rounded-2xl border border-line bg-card p-4">
        <h2 className="font-800 mb-3">महीना-दर-महीना</h2>
        <div className="flex items-end gap-1.5 h-32">
          {data.monthly.map((m,i)=>{
            const h = (m.win_rate/100)*100;
            const mon = new Date(m.month+'-01').toLocaleDateString('en',{month:'short'});
            return (
              <div key={i} className="flex-1 flex flex-col items-center justify-end h-full">
                <span className="text-[10px] font-num font-700 tabnum mb-1">{Math.round(m.win_rate)}</span>
                <div className="w-full rounded-t-md bg-gradient-to-t from-win to-win/70 bar-anim" style={{'--w':'100%', height:`${h}%`, minHeight:'4px'}}/>
                <span className="text-[9px] text-slate mt-1">{mon}</span>
              </div>
            );
          })}
        </div>
        <p className="text-[11px] text-slate mt-2 text-center">हर महीने जीती हुई सेशन का %</p>
      </div>
    </div>
  );
}

function Plans({data}){
  const plans = [...data.plans].sort((a,b)=> b.date.localeCompare(a.date));
  return (
    <div>
      <h1 className="text-2xl font-800 mb-1">प्लान — स्कोरकार्ड</h1>
      <p className="text-[13px] text-slate mb-4">रात को उन्होंने क्या सोचा, और अगले दिन मार्केट ने क्या किया।</p>
      <div className="space-y-3">
        {plans.map((p,i)=> <PlanCard key={p.date+i} p={p} sessions={data.sessions}/>)}
      </div>
    </div>
  );
}

function Empty({msg}){
  return <div className="text-center py-16 text-slate font-600">{msg} <div className="mt-3"><a href="#/" className="text-ink underline">Home</a></div></div>;
}

/* ---------- shell / router ---------- */
const TABS = [
  ['#/','होम','M3 11l9-8 9 8M5 10v10h14V10'],
  ['#/sessions','सेशन','M4 6h16M4 12h16M4 18h16'],
  ['#/setups','सेटअप','M4 19V9m6 10V5m6 14v-7'],
  ['#/plans','प्लान','M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2']
];

function useHash(){
  const [hash,setHash]=useState(location.hash||'#/');
  useEffect(()=>{
    const on=()=>{ setHash(location.hash||'#/'); window.scrollTo(0,0); };
    window.addEventListener('hashchange',on);
    return ()=>window.removeEventListener('hashchange',on);
  },[]);
  return hash;
}

function App(){
  const [data,setData]=useState(null);
  const [err,setErr]=useState(false);
  const hash = useHash();

  useEffect(()=>{
    fetch('data/data.json').then(r=>{ if(!r.ok) throw 0; return r.json();})
      .then(setData).catch(()=>setErr(true));
  },[]);

  let page=null, activeTab='#/';
  if(data){
    const [_,root,arg] = hash.split('/'); // ['#','session','2026-..']
    if(hash.startsWith('#/sessions')){ page=<Sessions data={data}/>; activeTab='#/sessions'; }
    else if(hash.startsWith('#/session/')){ page=<SessionDetail data={data} date={arg}/>; activeTab='#/sessions'; }
    else if(hash.startsWith('#/setups')){ page=<Setups data={data}/>; activeTab='#/setups'; }
    else if(hash.startsWith('#/plans')){ page=<Plans data={data}/>; activeTab='#/plans'; }
    else { page=<Home data={data}/>; activeTab='#/'; }
  }

  return (
    <div className="min-h-screen pb-24 max-w-md mx-auto">
      {/* header */}
      <header className="sticky top-0 z-20 bg-paper/95 backdrop-blur border-b border-line px-4 py-3 flex items-center justify-between">
        <a href="#/" className="flex items-center gap-2">
          <span className="w-8 h-8 rounded-lg bg-ink text-paper grid place-items-center font-stamp text-sm">TM</span>
          <span className="font-800 leading-none">Trade Mirror</span>
        </a>
        {data && <span className="text-[11px] font-700 px-2 py-1 rounded-full bg-win/10 text-win flex items-center gap-1">
          <svg className="w-3 h-3" viewBox="0 0 20 20" fill="currentColor"><path d="M10 1l2.4 5 5.6.5-4.2 3.7 1.3 5.5L10 18l-5.1 2.7 1.3-5.5L2 11.5 7.6 11z"/></svg>
          वेरिफाइड
        </span>}
      </header>

      <main className="px-4 pt-4">
        {err && <Empty msg="Data load nahi ho paya. data/data.json check karo."/>}
        {!data && !err && <LoadSkeleton/>}
        {page}
      </main>

      {/* bottom tab bar */}
      {data && (
        <nav className="fixed bottom-0 inset-x-0 z-20 bg-paper/97 backdrop-blur border-t border-line max-w-md mx-auto">
          <div className="grid grid-cols-4">
            {TABS.map(([href,label,d])=>{
              const on = href===activeTab;
              return (
                <a key={href} href={href} className={`py-2.5 flex flex-col items-center gap-0.5 ${on?'text-ink':'text-slate'}`}>
                  <svg className="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={on?2.4:1.8} strokeLinecap="round" strokeLinejoin="round"><path d={d}/></svg>
                  <span className={`text-[11px] ${on?'font-800':'font-600'}`}>{label}</span>
                </a>
              );
            })}
          </div>
        </nav>
      )}
    </div>
  );
}

/* skeleton so FCP shows meaningful shape, not a spinner */
function LoadSkeleton(){
  return (
    <div className="space-y-4 animate-pulse">
      <div className="h-5 w-32 bg-line rounded"/>
      <div className="h-52 bg-line rounded-3xl"/>
      <div className="h-16 bg-line rounded-2xl"/>
      <div className="grid grid-cols-3 gap-2.5">
        <div className="h-20 bg-line rounded-2xl"/><div className="h-20 bg-line rounded-2xl"/><div className="h-20 bg-line rounded-2xl"/>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
